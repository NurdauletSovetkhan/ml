seed: 42

paths:
  data: corrected
  models_dir: models
  preprocessor: models/preprocessor.joblib
  regression_model: models/regression_model.joblib
  pca_model: models/pca_model.joblib
  clustering_model: models/clustering_model.joblib
  logs_dir: logs

dataset:
  name: KDD Cup 1999 (10% corrected)
  label_column: label
  categorical_features:
    - protocol_type
    - service
    - flag
  feature_columns:
    - duration
    - protocol_type
    - service
    - flag
    - src_bytes
    - dst_bytes
    - land
    - wrong_fragment
    - urgent
    - hot
    - num_failed_logins
    - logged_in
    - num_compromised
    - root_shell
    - su_attempted
    - num_root
    - num_file_creations
    - num_shells
    - num_access_files
    - num_outbound_cmds
    - is_host_login
    - is_guest_login
    - count
    - srv_count
    - serror_rate
    - srv_serror_rate
    - rerror_rate
    - srv_rerror_rate
    - same_srv_rate
    - diff_srv_rate
    - srv_diff_host_rate
    - dst_host_count
    - dst_host_srv_count
    - dst_host_same_srv_rate
    - dst_host_diff_srv_rate
    - dst_host_same_src_port_rate
    - dst_host_srv_diff_host_rate
    - dst_host_serror_rate
    - dst_host_srv_serror_rate
    - dst_host_rerror_rate
    - dst_host_srv_rerror_rate

supervised:
  test_size: 0.2
  scaler: StandardScaler
  search:
    n_iter: 8
    cv: 5

unsupervised:
  sample_size: 50000
  pca_components: 2
  k_range: [2, 3, 4, 5, 6, 7, 8]
  anomaly_fraction: 0.01
